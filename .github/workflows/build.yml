name: CI

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Checkout
        uses: actions/checkout@v3

      - name: Hook the openwrt_core URL
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "${BRANCH_NAME}-${SHORT_SHA}" > version
          sed -i "s|%U/targets/%S/packages|https://127.0.0.1/packages|" include/feeds.mk

      - name: Configure & Update and install feeds
        run: |
          cp .config original.config
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp original.config .config
          echo "CONFIG_ALL_KMODS=y" >> .config
          make defconfig
          echo "FILES=${{ github.workspace }}/files" >> $GITHUB_ENV
          make defconfig

      - name: Download
        run: |
          make -j$(nproc) download

      - name: Build tools
        run: |
          make -j$(nproc) tools/install

      - name: Build toolchain
        run: |
          make -j$(nproc) toolchain/install

      - name: Build all
        run: |
          make -j$(nproc) IGNORE_ERRORS=1

      - name: Prepare and Upload Final Config
        if: always() 
        run: |
          mkdir -p Final_Config
          cp .config Final_Config/config_final || true
          cp original.config Final_Config/config_original || true
          tar -Jcvf config.tar.xz Final_Config
          mkdir -p bin
          mv config.tar.xz bin/

      - name: Upload bin to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin
          path: bin/*
